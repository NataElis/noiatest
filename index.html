    --purple:#6a56cf;
    --coral:#ff8b7a;
    --shadow:0 22px 60px rgba(38,34,54,0.10);
}

*{box-sizing:border-box;}

}

a{color:inherit;}

.site-header{

}

.appstore:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 42px rgba(23,23,26,0.22);
}

.secondary-link{

}

.secondary-link:hover{color:var(--ink);}

}

.proof-item{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.72);
    border-radius:8px;
    padding:13px;
}

.proof-item strong{
    display:block;
    font-size:15px;
    margin-bottom:3px;
}

.proof-item span{
    color:var(--muted);
    font-size:13px;
    line-height:1.35;
}

.phone-stage{
    display:flex;
    justify-content:center;
    position:relative;
}

    aspect-ratio:0.52;
    border-radius:38px;
    padding:14px;
    background:#17171a;
    box-shadow:var(--shadow);
}
